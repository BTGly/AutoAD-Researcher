version: "3.8"

services:
  autoad:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - runs_data:/app/runs
      - config_data:/app/data
    environment:
      - AUTOAD_HOST=0.0.0.0
      - AUTOAD_PORT=8000
      - AUTOAD_RUNS_ROOT=/app/runs
      - AUTOAD_EMBEDDED_WORKER=1
      - AUTOAD_EMBEDDED_WORKER_INTERVAL=2
    restart: unless-stopped

volumes:
  runs_data:
  config_data:
