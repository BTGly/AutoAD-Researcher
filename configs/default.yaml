# AutoAD-Researcher 默认配置
# 所有路径相对于项目根目录

# 模型网关配置
gateway:
  default_model: null              # 默认模型 ID（如 claude-sonnet-4-6）
  light_model: null                # 轻量任务模型
  strong_model: null               # 高风险任务模型
  embedding_model: null            # 检索任务模型
  api_base: null                   # API base URL
  api_key_env: "AUTORESEARCH_API_KEY"  # 从环境变量读取
  max_retries: 3
  timeout_seconds: 120

# 论文解析
paper:
  parser: "mineru"                 # mineru | markitdown | auto
  mineru_binary: "mineru"
  output_format: "markdown"

# 异常检测实验
experiment:
  dataset: "MVTec-AD"              # 默认数据集
  categories: ["bottle"]           # 默认类别
  baseline: "PatchCore"            # 默认 baseline
  metrics:
    - image_auroc
    - pixel_auroc
  max_runtime_minutes: 30

# 存储
storage:
  db_path: "data/autoad.db"        # SQLite 路径
  experiments_dir: "experiments"

# 安全
security:
  allowed_commands:                # Runner 白名单
    - "python"
    - "uv run"
    - "conda run"
  forbidden_patterns:
    - "rm -rf /"
    - "sudo"
    - "curl | bash"

# 人工确认点（MVP 阶段全部开启）
confirmation_gates:
  task_goal: true
  experiment_plan: true
  code_patch: true
  execute_command: true
  final_report: true
